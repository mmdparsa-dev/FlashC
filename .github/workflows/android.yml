name: Attach Debug APK to Release

on:
  release:
    types: [published] # زمانی اجرا می‌شود که ریلیز منتشر شده باشد

jobs:
  build-and-attach:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu' # یا 'temurin' وابسته به سلیقه خودتان
          java-version: '17'
          cache: 'gradle' # کش کردن گریدل برای بالا بردن سرعت بیلد در دفعات بعدی

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload Debug APK to Release
        uses: softprops/action-gh-release@v2
        with:
          # فایل APK تولید شده را پیدا کرده و آپلود می‌کند
          files: app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
